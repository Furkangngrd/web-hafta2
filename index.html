<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BEUShareBox — Ürün paylaşım platformu. Ürün ekle, beğen, yorum yap ve keşfet!" />
  <title>BEUShareBox — Ürün Paylaşım Platformu</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">📦 BEUShare<span>Box</span></h1>
      <p class="tagline">Ürünlerini paylaş, keşfet, beğen!</p>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="container">

    <!-- İstatistikler -->
    <section class="stats-bar" aria-label="İstatistikler">
      <div class="stat-card">
        <span class="stat-value" id="totalProducts">0</span>
        <span class="stat-label">Toplam Ürün</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="totalLikes">0</span>
        <span class="stat-label">Toplam Beğeni</span>
      </div>
    </section>

    <!-- Ürün Ekleme Formu -->
    <section class="form-section" aria-label="Ürün Ekle">
      <h2 class="section-title">Yeni Ürün Ekle</h2>
      <form id="productForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="title">Başlık</label>
            <input type="text" id="title" placeholder="Ürün başlığı" required />
          </div>
          <div class="form-group">
            <label for="price">Fiyat (₺)</label>
            <input type="number" id="price" placeholder="0.00" min="0" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="category">Kategori</label>
            <select id="category" required>
              <option value="">Kategori seçin</option>
              <option value="Elektronik">Elektronik</option>
              <option value="Giyim">Giyim</option>
              <option value="Kitap">Kitap</option>
              <option value="Spor">Spor</option>
              <option value="Ev & Yaşam">Ev & Yaşam</option>
              <option value="Diğer">Diğer</option>
            </select>
          </div>
          <div class="form-group">
            <label for="description">Açıklama</label>
            <textarea id="description" rows="3" placeholder="Ürün açıklamasını yazın..." required></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">➕ Ürünü Ekle</button>
      </form>
    </section>

    <!-- Filtreleme & Arama -->
    <section class="filter-section" aria-label="Filtrele ve Ara">
      <div class="filter-bar">
        <div class="filter-group">
          <label for="searchInput">🔍 Ara</label>
          <input type="search" id="searchInput" placeholder="Ürün ara..." />
        </div>
        <div class="filter-group">
          <label for="filterCategory">📂 Kategori</label>
          <select id="filterCategory">
            <option value="all">Tüm Kategoriler</option>
            <option value="Elektronik">Elektronik</option>
            <option value="Giyim">Giyim</option>
            <option value="Kitap">Kitap</option>
            <option value="Spor">Spor</option>
            <option value="Ev & Yaşam">Ev & Yaşam</option>
            <option value="Diğer">Diğer</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Ürün Listesi -->
    <section class="products-section" aria-label="Ürün Listesi">
      <h2 class="section-title">Ürünler</h2>
      <div id="productList" class="product-grid">
        <!-- Ürünler JavaScript ile render edilecek -->
      </div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <span class="empty-icon">📭</span>
        <p>Henüz ürün eklenmedi.</p>
        <p class="empty-hint">Yukarıdaki formu kullanarak ilk ürünü ekleyin!</p>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 BEUShareBox — Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>

</html>
